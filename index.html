<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>財富儀表板 ｜ 奶茶美學版</title>
    <!-- Tailwind CSS 4.0 執行環境 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- React 18 核心架構 -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel 即時編譯器 -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Recharts 圖表套件 -->
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <!-- Lucide 圖標庫 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* 訂製溫暖奶茶色調 */
        body { background-color: #f7f5f0; }
        .bg-milk-tea { background: linear-gradient(135deg, #c8b6a6 0%, #8d7b68 100%); }
        .text-milk-dark { color: #4a3f35; }
        .border-milk { border-color: #e6e1da; }
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        // 1. 將模組引入轉化為瀏覽器全域變數
        const { useState, useEffect, useCallback } = React;
        const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;
        const { Plus, Trash2, Edit2, RefreshCw, TrendingUp, TrendingDown, DollarSign, Activity, Globe, AlertCircle, Settings, Wallet, Target, Coffee, Home, Camera, X, Eye, EyeOff, BarChart2 } = lucide;

        // 2. 預設的投資組合資料
        const DEFAULT_PORTFOLIO = [
          { id: '1', symbol: 'AAPL', shares: 10, cost: 150 },
          { id: '2', symbol: '2330.TW', shares: 1000, cost: 500 },
          { id: '3', symbol: 'NVDA', shares: 5, cost: 400 }
        ];

        // 3. 完整功能核心
        function App() {
          // === 💡 採用 React 惰性初始狀態 (Lazy State Initialization) ===
          const [portfolio, setPortfolio] = useState(() => {
            const saved = localStorage.getItem('stock_portfolio');
            return saved ? JSON.parse(saved) : DEFAULT_PORTFOLIO;
          });

          const [marketData, setMarketData] = useState({});
          const [exchangeRate, setExchangeRate] = useState(32.0); 
          const [isLoading, setIsLoading] = useState(false);
          const [lastUpdated, setLastUpdated] = useState(null);
          const [fetchError, setFetchError] = useState(null); 

          // === 隱私遮蔽模式狀態 ===
          const [isPrivateMode, setIsPrivateMode] = useState(false);

          // === 資產配置與退休設定狀態 ===
          const [cashTWD, setCashTWD] = useState(() => {
            const saved = localStorage.getItem('portfolio_settings');
            if (saved) {
              const s = JSON.parse(saved);
              return s.cashTWD !== undefined ? s.cashTWD : 100000;
            }
            return 100000;
          });

          const [cashUSD, setCashUSD] = useState(() => {
            const saved = localStorage.getItem('portfolio_settings');
            if (saved) {
              const s = JSON.parse(saved);
              return s.cashUSD !== undefined ? s.cashUSD : 2000;
            }
            return 2000;
          });

          const [realEstateValue, setRealEstateValue] = useState(() => {
            const saved = localStorage.getItem('portfolio_settings');
            if (saved) {
              const s = JSON.parse(saved);
              return s.realEstateValue !== undefined ? s.realEstateValue : 15000000;
            }
            return 15000000;
          });

          const [loanValue, setLoanValue] = useState(() => {
            const saved = localStorage.getItem('portfolio_settings');
            if (saved) {
              const s = JSON.parse(saved);
              return s.loanValue !== undefined ? s.loanValue : 10000000;
            }
            return 10000000;
          });

          // 房產是否計入淨資產開關 (預設為 true)
          const [includeRealEstate, setIncludeRealEstate] = useState(() => {
            const saved = localStorage.getItem('portfolio_settings');
            if (saved) {
              const s = JSON.parse(saved);
              return s.includeRealEstate !== undefined ? s.includeRealEstate : true;
            }
            return true;
          });
          
          const [currentAge, setCurrentAge] = useState(() => {
            const saved = localStorage.getItem('portfolio_settings');
            if (saved) {
              const s = JSON.parse(saved);
              return s.currentAge !== undefined ? s.currentAge : 30;
            }
            return 30;
          });

          const [retireAge, setRetireAge] = useState(() => {
            const saved = localStorage.getItem('portfolio_settings');
            if (saved) {
              const s = JSON.parse(saved);
              return s.retireAge !== undefined ? s.retireAge : 65;
            }
            return 65;
          });

          const [expectedReturn, setExpectedReturn] = useState(() => {
            const saved = localStorage.getItem('portfolio_settings');
            if (saved) {
              const s = JSON.parse(saved);
              return s.expectedReturn !== undefined ? s.expectedReturn : 6;
            }
            return 6;
          });

          const [monthlyContribution, setMonthlyContribution] = useState(() => {
            const saved = localStorage.getItem('portfolio_settings');
            if (saved) {
              const s = JSON.parse(saved);
              return s.monthlyContribution !== undefined ? s.monthlyContribution : 10000;
            }
            return 10000;
          });

          // 表單控制狀態
          const [showModal, setShowModal] = useState(false);
          const [showSettingsModal, setShowSettingsModal] = useState(false);
          const [editingId, setEditingId] = useState(null); 
          const [newSymbol, setNewSymbol] = useState('');
          const [newShares, setNewShares] = useState('');
          const [newCost, setNewCost] = useState('');
          const [isAnalyzing, setIsAnalyzing] = useState(false);
          const [analyzeError, setAnalyzeError] = useState(null);
          const [confirmDeleteId, setConfirmDeleteId] = useState(null); 

          // === 歷史資產趨勢紀錄狀態 ===
          const [historyData, setHistoryData] = useState(() => {
            const saved = localStorage.getItem('portfolio_history');
            return saved ? JSON.parse(saved) : [];
          });

          // === 當資料改變時，100% 寫入暫存 ===
          useEffect(() => {
            localStorage.setItem('stock_portfolio', JSON.stringify(portfolio));
          }, [portfolio]);

          useEffect(() => {
            const settings = { cashTWD, cashUSD, realEstateValue, loanValue, includeRealEstate, currentAge, retireAge, expectedReturn, monthlyContribution };
            localStorage.setItem('portfolio_settings', JSON.stringify(settings));
          }, [cashTWD, cashUSD, realEstateValue, loanValue, includeRealEstate, currentAge, retireAge, expectedReturn, monthlyContribution]);

          // === 將歷史紀錄寫入暫存 ===
          useEffect(() => {
            localStorage.setItem('portfolio_history', JSON.stringify(historyData));
          }, [historyData]);

          // === 輔助函式：自動規格化台股代碼與判斷 TWD ===
          const getFormattedSymbol = (symbol) => {
            const sym = symbol.toUpperCase().trim();
            if (/^\d{4,6}$/.test(sym)) {
              return sym + '.TW';
            }
            return sym;
          };

          const checkIsTWD = (symbol) => {
            const sym = symbol.toUpperCase().trim();
            return sym.endsWith('.TW') || sym.endsWith('.TWO') || /^\d{4,6}$/.test(sym);
          };

          // 獲取真實股票報價與匯率
          const fetchStockData = useCallback(async () => {
            if (portfolio.length === 0) return;
            setIsLoading(true);
            setFetchError(null);
            
            const newDataUpdates = {};
            let hasError = false;

            const fetchWithFallback = async (symbol) => {
              const querySymbol = getFormattedSymbol(symbol);
              const urls = [
                `https://query1.finance.yahoo.com/v8/finance/chart/${querySymbol}?range=5d&interval=1d`,
                `https://query2.finance.yahoo.com/v8/finance/chart/${querySymbol}?range=5d&interval=1d`,
                `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${querySymbol}`,
                `https://query2.finance.yahoo.com/v7/finance/quote?symbols=${querySymbol}`
              ];

              for (const url of urls) {
                const encodedUrl = encodeURIComponent(url);
                const proxies = [
                  async () => {
                    const res = await fetch(`https://corsproxy.io/?${encodedUrl}`);
                    if (!res.ok) throw new Error('Corsproxy.io failed');
                    return await res.json();
                  },
                  async () => {
                    const res = await fetch(`https://api.allorigins.win/raw?url=${encodedUrl}`);
                    if (!res.ok) throw new Error('AllOrigins Raw failed');
                    return await res.json();
                  }
                ];

                for (const strategy of proxies) {
                  try {
                    const data = await strategy();
                    if (data && data.quoteResponse && data.quoteResponse.result && data.quoteResponse.result.length > 0) {
                      const res = data.quoteResponse.result[0];
                      return {
                        price: res.regularMarketPrice,
                        previousClose: res.regularMarketPreviousClose || res.regularMarketPrice,
                        currency: res.currency || (checkIsTWD(symbol) ? 'TWD' : 'USD')
                      };
                    }
                    if (data && data.chart && data.chart.result && data.chart.result.length > 0) {
                      const chartResult = data.chart.result[0];
                      const meta = chartResult.meta;
                      const indicators = chartResult.indicators;
                      
                      let price = meta.regularMarketPrice;
                      let previousClose = meta.chartPreviousClose || meta.previousClose || price;
                      
                      if ((price === undefined || price === null) && indicators && indicators.quote && indicators.quote[0] && indicators.quote[0].close) {
                        const closes = indicators.quote[0].close.filter(c => c !== null && c !== undefined);
                        if (closes.length > 0) {
                          price = closes[closes.length - 1];
                          previousClose = closes.length > 1 ? closes[closes.length - 2] : price;
                        }
                      }
                      if (price === undefined || price === null) {
                        price = previousClose;
                      }
                      if (price !== undefined && price !== null) {
                        return {
                          price: price,
                          previousClose: previousClose || price,
                          currency: meta.currency || (checkIsTWD(symbol) ? 'TWD' : 'USD')
                        };
                      }
                    }
                  } catch (e) {
                    continue;
                  }
                }
              }
              throw new Error(`無法獲取 ${symbol} 的資料`);
            };

            try {
              const fxData = await fetchWithFallback('TWD=X');
              if (fxData && fxData.price) setExchangeRate(fxData.price);
            } catch (error) {
              console.warn('無法獲取即時匯率，將使用預設值。', error);
            }

            for (const item of portfolio) {
              try {
                const result = await fetchWithFallback(item.symbol);
                if (result && result.price) {
                  newDataUpdates[item.symbol] = {
                    price: result.price,
                    previousClose: result.previousClose,
                    change: result.price - result.previousClose,
                    changePercent: result.previousClose ? ((result.price - result.previousClose) / result.previousClose) * 100 : 0,
                    currency: result.currency,
                    name: item.symbol
                  };
                }
              } catch (error) {
                console.error(`獲取 ${item.symbol} 報價失敗:`, error);
                hasError = true;
              }
            }

            if (hasError) setFetchError('部分報價更新失敗，請稍後重試。');
            setMarketData(prev => ({ ...prev, ...newDataUpdates }));
            setLastUpdated(new Date());
            setIsLoading(false);
          }, [portfolio]);

          useEffect(() => {
            fetchStockData();
            const intervalId = setInterval(fetchStockData, 60000); 
            return () => clearInterval(intervalId);
          }, [fetchStockData]);

          const handleOpenAdd = () => {
            setEditingId(null); setNewSymbol(''); setNewShares(''); setNewCost(''); setAnalyzeError(null); setShowModal(true);
          };

          const handleOpenEdit = (item) => {
            setEditingId(item.id); setNewSymbol(item.symbol); setNewShares(item.shares.toString()); setNewCost(item.cost.toString()); setAnalyzeError(null); setShowModal(true);
          };

          // === 影像辨識 (AI OCR) 邏輯 ===
          const analyzeImageWithBackoff = async (base64Data, retries = 5) => {
            const delays = [1000, 2000, 4000, 8000, 16000];
            const apiKey = ""; 
            const base64Image = base64Data.split(',')[1] || base64Data;
            const mimeTypeMatch = base64Data.match(/^data:(image\/\w+);base64,/);
            const mimeType = mimeTypeMatch ? mimeTypeMatch[1] : "image/jpeg";

            const payload = {
              contents: [{
                role: "user",
                parts: [
                  { text: "這是一張證券APP的截圖。請幫我找出圖中『所有』的持股明細。對於每一檔股票，請提供：1.股票代號(如果是台灣股票，請在代碼後加上.TW，例如2330.TW)。2.總股數。3.買進均價(成本價)。" },
                  { inlineData: { mimeType: mimeType, data: base64Image } }
                ]
              }],
              generationConfig: {
                responseMimeType: "application/json",
                responseSchema: {
                  type: "ARRAY",
                  items: {
                    type: "OBJECT",
                    properties: {
                      symbol: { type: "STRING" },
                      shares: { type: "NUMBER" },
                      cost: { type: "NUMBER" }
                    }
                  }
                }
              }
            };

            for (let i = 0; i < retries; i++) {
              try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(payload)
                });
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const result = await response.json();
                return JSON.parse(result.candidates[0].content.parts[0].text);
              } catch (error) {
                if (i === retries - 1) throw error;
                await new Promise(res => setTimeout(res, delays[i]));
              }
            }
          };

          const handleImageUpload = async (base64Data) => {
            setIsAnalyzing(true);
            setAnalyzeError(null);
            try {
              const data = await analyzeImageWithBackoff(base64Data);
              if (Array.isArray(data) && data.length > 0) {
                const newItems = data.map((item, index) => {
                  let symbolInput = item.symbol?.toUpperCase().trim() || '';
                  if (/^\d{4,6}$/.test(symbolInput)) {
                    symbolInput += '.TW';
                  }
                  return {
                    id: Date.now().toString() + index,
                    symbol: symbolInput,
                    shares: parseFloat(item.shares) || 0,
                    cost: parseFloat(item.cost) || 0
                  };
                }).filter(item => item.symbol && item.shares > 0);

                if (newItems.length > 0) {
                  setPortfolio(prev => [...prev, ...newItems]);
                  setShowModal(false); 
                } else {
                  setAnalyzeError("無法從圖片中辨識出有效的股票資訊。");
                }
              } else {
                setAnalyzeError("無法從圖片中辨識出股票資訊，請確認截圖清晰或嘗試手動輸入。");
              }
            } catch (error) {
              setAnalyzeError("圖片辨識失敗，請確認截圖清晰或嘗試手動輸入。");
            } finally {
              setIsAnalyzing(false);
            }
          };

          const handlePaste = (e) => {
            const items = e.clipboardData?.items;
            if (!items) return;
            for (let i = 0; i < items.length; i++) {
              if (items[i].type.indexOf('image') !== -1) {
                const blob = items[i].getAsFile();
                const reader = new FileReader();
                reader.onload = (event) => handleImageUpload(event.target.result);
                reader.readAsDataURL(blob);
                break;
              }
            }
          };

          const handleFileChange = (e) => {
            const file = e.target.files[0];
            if (file && file.type.startsWith('image/')) {
              const reader = new FileReader();
              reader.onload = (event) => handleImageUpload(event.target.result);
              reader.readAsDataURL(file);
            }
          };

          const handleSaveStock = (e) => {
            e.preventDefault();
            if (!newSymbol || !newShares || !newCost) return;

            let symbolInput = newSymbol.toUpperCase().trim();
            if (/^\d{4,6}$/.test(symbolInput)) {
              symbolInput += '.TW';
            }

            const savedItem = {
              id: editingId || Date.now().toString(),
              symbol: symbolInput,
              shares: parseFloat(newShares),
              cost: parseFloat(newCost)
            };

            if (editingId) setPortfolio(portfolio.map(item => item.id === editingId ? savedItem : item));
            else setPortfolio([...portfolio, savedItem]);
            setShowModal(false);
          };

          const triggerDelete = (id) => {
            setConfirmDeleteId(id);
          };

          const executeDelete = () => {
            if (confirmDeleteId) {
              setPortfolio(portfolio.filter(item => item.id !== confirmDeleteId));
              setConfirmDeleteId(null);
            }
          };

          const calculateTotals = () => {
            let totalStockValueUSD = 0, totalStockCostUSD = 0;
            let totalStockValueTWD = 0, totalStockCostTWD = 0;

            portfolio.forEach(item => {
              const data = marketData[item.symbol];
              const isTWD = checkIsTWD(item.symbol);
              const currentPrice = data && data.price ? data.price : item.cost;
              
              const value = currentPrice * item.shares;
              const cost = item.cost * item.shares;

              if (isTWD) {
                totalStockValueTWD += value; totalStockCostTWD += cost;
                totalStockValueUSD += value / exchangeRate; totalStockCostUSD += cost / exchangeRate;
              } else {
                totalStockValueUSD += value; totalStockCostUSD += cost;
                totalStockValueTWD += value * exchangeRate; totalStockCostTWD += cost * exchangeRate;
              }
            });

            const totalCashTWD = cashTWD + (cashUSD * exchangeRate);
            const activeRealEstateValue = includeRealEstate ? realEstateValue : 0;
            const totalAssetsTWD = totalStockValueTWD + totalCashTWD + activeRealEstateValue;
            const totalLiabilitiesTWD = loanValue;

            const netAssetsTWD = totalAssetsTWD - totalLiabilitiesTWD;
            const netAssetsUSD = netAssetsTWD / exchangeRate;

            const stockPL_TWD = totalStockValueTWD - totalStockCostTWD;
            const stockPLPercent = totalStockCostTWD > 0 ? (stockPL_TWD / totalStockCostTWD) * 100 : 0;

            const stockRatio = totalAssetsTWD > 0 ? (totalStockValueTWD / totalAssetsTWD) * 100 : 0;
            const cashRatio = totalAssetsTWD > 0 ? (totalCashTWD / totalAssetsTWD) * 100 : 0;
            const realEstateRatio = totalAssetsTWD > 0 ? (activeRealEstateValue / totalAssetsTWD) * 100 : 0;

            return { 
              netAssetsTWD, netAssetsUSD, totalAssetsTWD, totalLiabilitiesTWD,
              stockValueTWD: totalStockValueTWD, stockPL_TWD, stockPLPercent,
              totalCashTWD, realEstateValue, loanValue,
              stockRatio, cashRatio, realEstateRatio
            };
          };

          const totals = calculateTotals();

          useEffect(() => {
            if (isLoading || (portfolio.length > 0 && Object.keys(marketData).length === 0)) return;

            const today = new Date();
            const dateString = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

            setHistoryData(prev => {
              const newHistory = [...prev];
              const existingIndex = newHistory.findIndex(d => d.date === dateString);

              const newEntry = {
                date: dateString,
                stockValue: totals.stockValueTWD,
                netWorth: totals.netAssetsTWD
              };

              if (existingIndex >= 0) {
                if (newHistory[existingIndex].stockValue === newEntry.stockValue &&
                    newHistory[existingIndex].netWorth === newEntry.netWorth) {
                  return prev;
                }
                newHistory[existingIndex] = newEntry;
              } else {
                newHistory.push(newEntry);
              }

              if (newHistory.length > 30) {
                newHistory.shift();
              }

              return newHistory;
            });
          }, [totals.stockValueTWD, totals.netAssetsTWD, isLoading, marketData, portfolio.length]);

          const retirement = calculateRetirement();

          function calculateRetirement() {
            const yearsToRetire = Math.max(0, retireAge - currentAge);
            const monthsToRetire = yearsToRetire * 12;
            const monthlyRate = (expectedReturn / 100) / 12;
            const presentValue = totals.netAssetsTWD; 

            let futureValue = 0;
            if (monthlyRate === 0) {
              futureValue = presentValue + (monthlyContribution * monthsToRetire);
            } else {
              futureValue = presentValue * Math.pow(1 + monthlyRate, monthsToRetire) + 
                            monthlyContribution * ((Math.pow(1 + monthlyRate, monthsToRetire) - 1) / monthlyRate);
            }

            const safeWithdrawalMonthly = (futureValue * 0.04) / 12;
            return { futureValue, safeWithdrawalMonthly, yearsToRetire };
          }

          const formatNum = (num, decimals = 2) => {
            return new Intl.NumberFormat('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals }).format(num);
          };

          const displayValue = (val, decimals = 2, prefix = "") => {
            if (isPrivateMode) return "******";
            return prefix + formatNum(val, decimals);
          };

          return (
            <div className="min-h-screen text-amber-950 font-sans pb-24 animate-fade-in">
              {/* 頂部導航列 */}
              <div className="bg-white/80 backdrop-blur-md shadow-sm px-4 py-4 sticky top-0 z-10 flex justify-between items-center border-b border-milk">
                <div className="flex items-center gap-2 text-amber-800">
                  <Activity size={24} className="font-bold" />
                  <h1 className="text-xl font-bold">財富儀表板</h1>
                </div>
                <div className="flex flex-col items-end">
                  <div className="flex items-center gap-1">
                    <button onClick={() => setShowSettingsModal(true)} className="p-2 rounded-full hover:bg-stone-100 transition-colors text-stone-600" title="設定資產與退休目標">
                      <Settings size={22} />
                    </button>
                    <button onClick={fetchStockData} disabled={isLoading} className="p-2 rounded-full hover:bg-stone-100 transition-colors" title="更新股價與匯率">
                      <RefreshCw size={20} className={`text-stone-600 ${isLoading ? 'animate-spin' : ''}`} />
                    </button>
                  </div>
                  {lastUpdated && (
                    <div className="text-[10px] text-stone-400 font-medium mr-2 mt-0.5">
                      更新於 {lastUpdated.toLocaleTimeString('zh-TW', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' })}
                    </div>
                  )}
                </div>
              </div>

              <div className="max-w-2xl mx-auto p-4 space-y-5">
                {fetchError && (
                  <div className="bg-red-50 text-red-600 px-4 py-3 rounded-xl text-sm flex items-center shadow-sm border border-red-100">
                    <AlertCircle size={18} className="mr-2 flex-shrink-0" />
                    {fetchError}
                  </div>
                )}

                {/* --- 區塊 1：總淨資產 (奶茶調視覺) --- */}
                <div className="bg-milk-tea rounded-2xl p-6 text-white shadow-md relative overflow-hidden">
                  <div className="absolute top-0 right-0 -mr-8 -mt-8 w-32 h-32 rounded-full bg-white opacity-5"></div>
                  
                  <div className="flex justify-between items-start mb-2 relative z-10">
                    <div className="flex items-center gap-2">
                      <p className="text-stone-100 text-sm font-medium">個人總淨資產 (Net Worth)</p>
                      <button onClick={() => setIsPrivateMode(!isPrivateMode)} className="text-stone-200 hover:text-white transition-colors" title={isPrivateMode ? "顯示金額" : "隱藏金額"}>
                        {isPrivateMode ? <EyeOff size={16} /> : <Eye size={16} />}
                      </button>
                      {!includeRealEstate && (
                        <span className="text-[10px] bg-amber-500/30 text-amber-100 border border-amber-500/40 px-1.5 py-0.5 rounded font-semibold">已扣除固定資產</span>
                      )}
                    </div>
                    <div className="flex items-center text-xs text-stone-100 bg-black/10 backdrop-blur-sm px-2 py-1 rounded-full">
                      <Globe size={12} className="mr-1" />
                      USD/TWD: {formatNum(exchangeRate, 2)}
                    </div>
                  </div>
                  
                  <div className="mb-6 relative z-10">
                    <div className="text-4xl sm:text-5xl font-bold tracking-tight text-white mb-1 drop-shadow-sm flex items-baseline">
                      <span className="text-2xl mr-1 font-medium text-stone-200">NT$</span>
                      {displayValue(totals.netAssetsTWD, 0)}
                    </div>
                    <div className="flex flex-wrap gap-x-4 gap-y-1 text-sm font-medium mt-2 opacity-95">
                      <div>總資產: {displayValue(totals.totalAssetsTWD, 0, "NT$ ")}</div>
                      <div className="text-amber-100">股票市值: {displayValue(totals.stockValueTWD, 0, "NT$ ")}</div>
                      <div className="text-stone-300">總負債: {displayValue(totals.totalLiabilitiesTWD, 0, "NT$ ")}</div>
                    </div>
                  </div>

                  <div className="relative z-10 pt-4 border-t border-white/10">
                    <div className="flex justify-between text-xs text-stone-100 mb-1.5 font-medium">
                      <span className="flex items-center gap-1"><TrendingUp size={12}/> 股票 {formatNum(totals.stockRatio, 1)}%</span>
                      <span className="flex items-center gap-1"><Wallet size={12}/> 現金 {formatNum(totals.cashRatio, 1)}%</span>
                      {includeRealEstate && (
                        <span className="flex items-center gap-1"><Home size={12}/> 房產 {formatNum(totals.realEstateRatio, 1)}%</span>
                      )}
                    </div>
                    <div className="h-2 w-full bg-black/10 rounded-full overflow-hidden flex">
                      <div className="h-full bg-amber-200 transition-all duration-300" style={{ width: `${totals.stockRatio}%` }}></div>
                      <div className="h-full bg-stone-300 transition-all duration-300" style={{ width: `${totals.cashRatio}%` }}></div>
                      {includeRealEstate && (
                        <div className="h-full bg-orange-100 transition-all duration-300" style={{ width: `${totals.realEstateRatio}%` }}></div>
                      )}
                    </div>
                  </div>
                </div>

                {/* --- 區塊 2：退休財富預估 --- */}
                <div className="bg-white rounded-2xl p-5 shadow-sm border border-milk hover:shadow-md transition-shadow relative overflow-hidden group">
                  <div className="absolute -right-6 -top-6 text-stone-50 group-hover:text-stone-100 transition-colors z-0">
                    <Coffee size={100} />
                  </div>
                  <div className="relative z-10">
                    <div className="flex justify-between items-center mb-4">
                      <h2 className="text-lg font-bold flex items-center gap-2 text-stone-800">
                        <Target size={20} className="text-amber-700" />
                        退休財富預估
                      </h2>
                      <button onClick={() => setShowSettingsModal(true)} className="text-xs font-medium text-amber-800 bg-stone-100 border border-milk px-2 py-1 rounded-md">修改參數</button>
                    </div>
                    
                    <p className="text-sm text-stone-600 mb-4">
                      距離退休還有 <strong className="text-stone-800">{retirement.yearsToRetire} 年</strong>，若維持每月投入 <strong className="text-stone-800">NT${formatNum(monthlyContribution, 0)}</strong> 且年報酬 <strong className="text-stone-800">{expectedReturn}%</strong>：
                    </p>

                    <div className="grid grid-cols-2 gap-3">
                      <div className="bg-stone-50 border border-milk rounded-xl p-3">
                        <p className="text-xs text-stone-500 mb-1 font-medium">預估退休總淨資產</p>
                        <div className="text-xl font-bold text-stone-800">
                          <span className="text-sm mr-1">NT$</span>{displayValue(retirement.futureValue, 0)}
                        </div>
                      </div>
                      <div className="bg-stone-50 border border-milk rounded-xl p-3">
                        <p className="text-xs text-stone-500 mb-1 font-medium">預估每月被動收入 (4%法則)</p>
                        <div className="text-xl font-bold text-stone-800">
                          <span className="text-sm mr-1">NT$</span>{displayValue(retirement.safeWithdrawalMonthly, 0)}
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                {/* --- 區塊 2.5：資產成長趨勢圖表 --- */}
                {historyData.length > 0 && (
                  <div className="bg-white rounded-2xl p-5 shadow-sm border border-milk hover:shadow-md transition-shadow relative overflow-hidden">
                    <div className="flex justify-between items-center mb-4">
                      <h2 className="text-lg font-bold flex items-center gap-2 text-stone-800">
                        <BarChart2 size={20} className="text-amber-800" />
                        資產成長趨勢 (最近30天)
                      </h2>
                    </div>
                    <div className="h-56 w-full -ml-4">
                      <ResponsiveContainer width="100%" height="100%">
                        <LineChart data={historyData.map(d => ({ ...d, displayDate: d.date.substring(5).replace('-', '/') }))} margin={{ top: 5, right: 20, left: 10, bottom: 5 }}>
                          <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f5f2eb" />
                          <XAxis dataKey="displayDate" tick={{ fontSize: 12, fill: '#78716c' }} tickLine={false} axisLine={false} tickMargin={10} minTickGap={20} />
                          <YAxis tick={{ fontSize: 12, fill: '#78716c' }} tickLine={false} axisLine={false} tickFormatter={(value) => value >= 10000 ? `${(value / 10000).toFixed(0)}W` : value} width={50} />
                          <Tooltip formatter={(value, name) => [isPrivateMode ? '******' : `NT$ ${formatNum(value, 0)}`, name]} labelStyle={{ color: '#444', fontWeight: 'bold' }} contentStyle={{ borderRadius: '12px', border: '1px solid #e6e1da' }} />
                          <Line type="monotone" dataKey="netWorth" name="總淨資產" stroke="#8d7b68" strokeWidth={3} dot={{ r: 3, fill: '#fff' }} />
                          <Line type="monotone" dataKey="stockValue" name="股票市值" stroke="#c8b6a6" strokeWidth={3} dot={{ r: 3, fill: '#fff' }} />
                        </LineChart>
                      </ResponsiveContainer>
                    </div>
                  </div>
                )}

                {/* --- 區塊 3：股票持股明細 --- */}
                <div>
                  <div className="flex justify-between items-end mb-3">
                    <h2 className="text-lg font-bold flex items-center gap-2 text-stone-800">
                      <TrendingUp size={18} className="text-stone-500" />
                      持股明細
                    </h2>
                    <div className="text-right">
                      <div className="text-sm font-bold text-stone-800 mb-0.5">股市總市值: {displayValue(totals.stockValueTWD, 0, "NT$ ")}</div>
                      <div className={`text-xs font-semibold ${totals.stockPL_TWD >= 0 ? 'text-amber-800' : 'text-stone-500'}`}>
                        未實現: {totals.stockPL_TWD >= 0 ? '+' : ''}{displayValue(totals.stockPL_TWD, 0)} ({totals.stockPLPercent >= 0 ? '+' : ''}{formatNum(totals.stockPLPercent)}%)
                      </div>
                    </div>
                  </div>
                  
                  {portfolio.length === 0 ? (
                    <div className="text-center py-12 text-stone-400 bg-white rounded-2xl border border-dashed border-stone-300">目前沒有持股紀錄，點擊右下角新增吧！</div>
                  ) : (
                    <div className="space-y-3">
                      {portfolio.map((item) => {
                        const data = marketData[item.symbol];
                        const currentPrice = data ? data.price : item.cost;
                        const pl = (currentPrice - item.cost) * item.shares;
                        const plPercent = ((currentPrice - item.cost) / item.cost) * 100;
                        const isPositive = pl >= 0;
                        const isTWD = checkIsTWD(item.symbol);
                        const currencySymbol = isTWD ? 'NT$' : '$';

                        return (
                          <div key={item.id} className="bg-white p-4 rounded-xl shadow-sm border border-milk flex flex-col sm:flex-row justify-between sm:items-center gap-4 hover:shadow-md transition-shadow">
                            <div className="flex-1 flex justify-between sm:justify-start sm:gap-8 items-center">
                              <div>
                                <div className="flex items-center gap-2">
                                  <h3 className="font-bold text-lg text-stone-800">{item.symbol}</h3>
                                  <span className="text-[10px] px-1.5 py-0.5 rounded bg-stone-50 text-stone-500 border border-milk font-semibold">{isTWD ? 'TWD' : 'USD'}</span>
                                </div>
                                <p className="text-sm text-stone-500 mt-0.5">{item.shares} 股 · 均價 {currencySymbol}{item.cost}</p>
                              </div>
                              <div className="text-right sm:text-left">
                                <div className="font-bold text-lg text-stone-800">{currencySymbol}{data ? displayValue(data.price) : '...'}</div>
                                <div className={`text-sm font-medium ${isPositive ? 'text-amber-800' : 'text-stone-500'}`}>
                                  {isPositive ? '+' : ''}{displayValue(pl)} ({isPositive ? '+' : ''}{formatNum(plPercent)}%)
                                </div>
                              </div>
                            </div>
                            <div className="flex justify-end gap-2 border-t sm:border-t-0 border-stone-100 pt-3 sm:pt-0">
                              <button onClick={() => handleOpenEdit(item)} className="p-2 text-stone-400 hover:text-amber-800 rounded-lg transition-colors"><Edit2 size={16} /></button>
                              <button onClick={() => triggerDelete(item.id)} className="p-2 text-stone-400 hover:text-stone-700 rounded-lg transition-colors"><Trash2 size={16} /></button>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              </div>

              <button onClick={handleOpenAdd} className="fixed bottom-6 right-6 bg-amber-800 text-white p-4 rounded-full shadow-lg hover:bg-amber-900 transition-all z-20">
                <Plus size={24} />
              </button>

              {/* === Modal 視窗元件集 === */}
              {confirmDeleteId && (
                <div className="fixed inset-0 bg-stone-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in">
                  <div className="bg-white rounded-2xl w-full max-w-sm p-6 shadow-xl border border-milk">
                    <h3 className="text-xl font-bold text-stone-800 mb-2 flex items-center gap-2"><AlertCircle className="text-amber-800" size={24} />確認刪除</h3>
                    <p className="text-stone-600 mb-6 text-sm">您確定要刪除這筆交易紀錄嗎？</p>
                    <div className="flex gap-3">
                      <button onClick={() => setConfirmDeleteId(null)} className="flex-1 py-2.5 px-4 bg-stone-100 text-stone-700 font-bold rounded-xl text-sm">取消</button>
                      <button onClick={executeDelete} className="flex-1 py-2.5 px-4 bg-amber-800 text-white font-bold rounded-xl text-sm">確定刪除</button>
                    </div>
                  </div>
                </div>
              )}

              {showSettingsModal && (
                <div className="fixed inset-0 bg-stone-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in">
                  <div className="bg-white rounded-2xl w-full max-w-md p-6 shadow-xl max-h-[90vh] overflow-y-auto border border-milk">
                    <div className="flex justify-between items-center mb-5">
                      <h2 className="text-xl font-bold text-stone-800 flex items-center gap-2"><Settings size={22} className="text-amber-800"/> 參數設定</h2>
                      <button onClick={() => setShowSettingsModal(false)} className="text-stone-400 hover:text-stone-700"><X size={24} /></button>
                    </div>
                    <div className="space-y-4 text-sm text-stone-700">
                      <div className="bg-stone-50 p-4 rounded-xl border border-milk space-y-3">
                        <div className="flex justify-between items-center pb-2 border-b border-stone-200">
                          <h3 className="font-bold text-stone-800 flex items-center gap-1.5"><Home size={16}/> 房產與負債</h3>
                          <label className="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" checked={includeRealEstate} onChange={(e) => setIncludeRealEstate(e.target.checked)} className="sr-only peer"/>
                            <div className="w-9 h-5 bg-stone-200 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-amber-800"></div>
                          </label>
                        </div>
                        <div className="space-y-2">
                          <div><label className="block text-xs font-medium text-stone-500 mb-1">房產總市值 (TWD)</label><input type="number" value={realEstateValue} onChange={(e) => setRealEstateValue(Number(e.target.value))} className="w-full p-2 border border-stone-300 rounded-lg bg-white"/></div>
                          <div><label className="block text-xs font-medium text-stone-500 mb-1">貸款 / 負債總額 (TWD)</label><input type="number" value={loanValue} onChange={(e) => setLoanValue(Number(e.target.value))} className="w-full p-2 border border-stone-300 rounded-lg bg-white"/></div>
                        </div>
                      </div>

                      <div className="bg-stone-50 p-4 rounded-xl border border-milk space-y-2">
                        <h3 className="font-bold text-stone-800 flex items-center gap-1.5 mb-2"><Wallet size={16}/> 現金資產</h3>
                        <div><label className="block text-xs font-medium text-stone-500 mb-1">台幣現金 (TWD)</label><input type="number" value={cashTWD} onChange={(e) => setCashTWD(Number(e.target.value))} className="w-full p-2 border border-stone-300 rounded-lg bg-white"/></div>
                        <div><label className="block text-xs font-medium text-stone-500 mb-1">美金現金 (USD)</label><input type="number" value={cashUSD} onChange={(e) => setCashUSD(Number(e.target.value))} className="w-full p-2 border border-stone-300 rounded-lg bg-white"/></div>
                      </div>

                      <div className="bg-stone-50 p-4 rounded-xl border border-milk">
                        <h3 className="font-bold text-stone-800 flex items-center gap-1.5 mb-3"><Target size={16}/> 退休計畫試算</h3>
                        <div className="grid grid-cols-2 gap-3 mb-2">
                          <div><label className="block text-xs font-medium text-stone-500 mb-1">現在年齡</label><input type="number" value={currentAge} onChange={(e) => setCurrentAge(Number(e.target.value))} className="w-full p-2 border border-stone-300 rounded-lg bg-white"/></div>
                          <div><label className="block text-xs font-medium text-stone-500 mb-1">預計退休年齡</label><input type="number" value={retireAge} onChange={(e) => setRetireAge(Number(e.target.value))} className="w-full p-2 border border-stone-300 rounded-lg bg-white"/></div>
                        </div>
                        <div className="space-y-2">
                          <div><label className="block text-xs font-medium text-stone-500 mb-1">每月持續投入 (TWD)</label><input type="number" value={monthlyContribution} onChange={(e) => setMonthlyContribution(Number(e.target.value))} className="w-full p-2 border border-stone-300 rounded-lg bg-white"/></div>
                          <div><label className="block text-xs font-medium text-stone-500 mb-1">預期年化報酬率 (%)</label><input type="number" step="0.1" value={expectedReturn} onChange={(e) => setExpectedReturn(Number(e.target.value))} className="w-full p-2 border border-stone-300 rounded-lg bg-white"/></div>
                        </div>
                      </div>
                    </div>
                    <button onClick={() => setShowSettingsModal(false)} className="w-full mt-6 py-2.5 px-4 bg-amber-800 text-white font-bold rounded-xl text-sm">儲存並關閉</button>
                  </div>
                </div>
              )}

              {showModal && (
                <div className="fixed inset-0 bg-stone-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in">
                  <div className="bg-white rounded-2xl w-full max-w-md p-6 shadow-xl border border-milk" onPaste={handlePaste}>
                    <div className="flex justify-between items-center mb-4">
                      <h2 className="text-xl font-bold text-stone-800">{editingId ? '編輯交易紀錄' : '新增交易紀錄'}</h2>
                      <button onClick={() => setShowModal(false)} className="text-stone-400 hover:text-stone-700"><X size={24} /></button>
                    </div>

                    {!editingId && (
                      <div className="mb-4">
                         <div className="border-2 border-dashed border-stone-300 rounded-xl p-4 text-center bg-stone-50 relative cursor-pointer">
                            <input type="file" accept="image/*" onChange={handleFileChange} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                            {isAnalyzing ? (
                               <div className="flex flex-col items-center justify-center text-amber-800 py-2">
                                  <RefreshCw size={24} className="animate-spin mb-2" />
                                  <span className="text-xs font-medium">AI 正在解析截圖數據...</span>
                               </div>
                            ) : (
                               <div className="flex flex-col items-center justify-center text-stone-500 py-1">
                                  <Camera size={24} className="text-stone-400 mb-1" />
                                  <p className="text-xs font-medium">點擊選擇 / 貼上 (Ctrl+V) 證券截圖</p>
                                </div>
                            )}
                         </div>
                         {analyzeError && <p className="text-xs text-red-500 mt-2 bg-red-50 p-2 rounded-lg">{analyzeError}</p>}
                      </div>
                    )}

                    <form onSubmit={handleSaveStock} className="space-y-3 text-sm">
                      <div>
                        <label className="block font-medium text-stone-700 mb-1">股票代號</label>
                        <input type="text" value={newSymbol} onChange={(e) => setNewSymbol(e.target.value)} placeholder="如: AAPL 或 2330.TW" className="w-full p-2 border border-stone-300 rounded-lg outline-none uppercase bg-stone-50" required />
                      </div>
                      <div className="flex gap-3">
                        <div className="flex-1">
                          <label className="block font-medium text-stone-700 mb-1">總股數</label>
                          <input type="number" step="any" value={newShares} onChange={(e) => setNewShares(e.target.value)} className="w-full p-2 border border-stone-300 rounded-lg bg-stone-50" required />
                        </div>
                        <div className="flex-1">
                          <label className="block font-medium text-stone-700 mb-1">買進均價</label>
                          <input type="number" step="any" value={newCost} onChange={(e) => setNewCost(e.target.value)} className="w-full p-2 border border-stone-300 rounded-lg bg-stone-50" required />
                        </div>
                      </div>
                      <div className="flex gap-3 mt-6 pt-2">
                        <button type="button" onClick={() => setShowModal(false)} className="flex-1 py-2 px-4 bg-stone-100 text-stone-700 font-bold rounded-xl">取消</button>
                        <button type="submit" className="flex-1 py-2 px-4 bg-amber-800 text-white font-bold rounded-xl">{editingId ? '儲存變更' : '確認新增'}</button>
                      </div>
                    </form>
                  </div>
                </div>
              )}
            </div>
          );
        }

        // 4. 將完整應用程式渲染至節點上
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
